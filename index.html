<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigerian Foods</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <nav class="d-flex align-items-center justify-content-between ">
            <h3 class="m-0"><span>F</span>ood Bank</h3>
            <ul>
                <li><a class="text-decoration-none fw-semibold text-white" href="">Home</a></li>
                <li><a class="text-decoration-none fw-semibold text-white" href="">Region</a></li>
                <li><a class="text-decoration-none fw-semibold text-white" href="">About</a></li>
            </ul>
            <button class=" rounded-5 fw-semibold text-white">Favourites</button>
        </nav>

        <div class="main-content d-flex align-items-center justify-content-center flex-column ">
            <h2 class="fs-1">Discover Flavors From Every Region</h2>
            <p class="fs-5 my-2">Browse indegious and continental dishes in one place</p>
            <div class="d-flex bg-white align-items-center  w-100 ps-3 rounded-5 my-5 justify-content-between">
                <input onkeyup="searchFoods(event)" style="border: none;" class="py-2   w-100 rounded-5 bg-transparent"
                    type="text" placeholder="Search food name, ingredients, or region..." id="userSearch">
                <img class="py-2 px-3 " src="Image/search-icon.png" alt=""
                    style="background-color: rgb(249, 110, 59); border-bottom-right-radius: 20px; border-top-right-radius: 20px; cursor: pointer;">
            </div>
        </div>
    </header>


    <section>

        <h3 class="mb-3 text-center">Popular Dishes</h3>

        <div id="filter">
            <div class="d-flex flex-wrap gap-2 align-items-center justify-content-center">
                <select onchange="filterByCategory()" name="" id="mealCategory">
                    <option selected disabled value="0">Category</option>
                    <option value="Main Course">Main Course</option>
                    <option value="Soup">Soup</option>
                    <option value="Swallow">Swallow</option>
                    <option value="Snack/Street Food">Snack/Street Food</option>
                    <option value="Breakfast/Snack">Breakfast/Snack</option>
                    <option value="Side Dish">Side Dish</option>
                    <option value="Appetizer/Side Dish">Appetizer/Side Dish</option>
                    <option value="Snack/Dessert">Snack/Dessert</option>
                </select>

                <select onchange="filterByRegion()" name="" id="mealRegion">
                    <option selected disabled value='0'>Region</option>
                    <option value="All regions">All regions</option>
                    <option value="Northern">Northern Nigeria</option>
                    <option value="East">South-East Nigeria</option>
                    <option value="South-South">South-South Nigeria</option>
                    <option value="West">South-West Nigeria</option>
                </select>

                <label style="cursor: pointer;"
                    class="border border-black bg-white rounded-3 d-flex align-items-center gap-3 "
                    for="vegetarian">Vegetarian <input class="mt-1" type="checkbox" name="foodType" id="vegetarian"
                        value="vegetarian"></label>
                <label style="cursor: pointer;"
                    class="border border-black bg-white rounded-3 d-flex align-items-center gap-3 " for="spicy">Spicy
                    <input class="mt-1" type="checkbox" name="foodType" id="spicy" value="spicy"></label>
                <button onclick="clearFilters()" class="btn btn-dark ms-5">Clear Filters</button>
            </div>
        </div>


        <div id="spinnerContainer" class=" justify-content-center align-items-center"
            style="display: flex; height: 100px;">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div id="displayFoods" style="display: flex;" class=" flex-wrap align-items-start justify-content-center my-5 ">
        </div>

        <!-- Scrollable modal -->
        <div class="modal fade" id="foodDisplay" tabindex="1">
            <div id="modalDialog" class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"></div>
        </div>



    </section>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</html>
