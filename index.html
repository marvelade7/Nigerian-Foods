<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <nav class="d-flex align-items-center justify-content-between ">
            <h3 class="fs-3"><span>F</span>ood Bank</h3>
            <ul class="d-flex align-items-center gap-5 m-0">
                <li><a class="text-decoration-none fw-semibold text-white" href="">Home</a></li>
                <li><a class="text-decoration-none fw-semibold text-white" href="">Region</a></li>
                <li><a class="text-decoration-none fw-semibold text-white" href="">About</a></li>
                <button class="px-4 rounded-5 py-1 text-white">Donate</button>
            </ul>
        </nav>

        <div class="main-content d-flex align-items-center justify-content-center flex-column w-50">
            <h2 class="fs-1">Discover Flavors From Every Region</h2>
            <p class="fs-5 my-2">Browse indegious and continental dishes in one place</p>
            <div class="d-flex bg-white align-items-center  w-100 ps-3 rounded-5 my-5 justify-content-between">
                <input onkeyup="searchFoods(event)" style="border: none;" class="py-2   w-100 rounded-5 bg-transparent" type="text"
                    placeholder="Search food name, ingredients, or region..." id="userSearch">
                <img class="py-2 px-3 " src="Image/search-icon.png" alt=""
                    style="background-color: rgb(249, 110, 59); border-bottom-right-radius: 20px; border-top-right-radius: 20px; cursor: pointer;">
            </div>
        </div>
    </header>


    <section class="">
        <div id="filter">
            <div class="d-flex gap-4 align-items-center justify-content-center">
                <select onchange="filterMeals(1)" name="" id="mealCategory">
                    <option selected disabled value="0">Meal Type</option>
                    <option value="Appetizer">Appetizer</option>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Dessert">Dessert</option>
                    <option value="Main Course">Main Course</option>
                    <option value="Side Dish">Side Dish</option>
                    <option value="Soup">Soup</option>
                    <option value="Snack">Snack</option>
                    <option value="Street Food">Street Food</option>
                    <option value="Swallow">Swallow</option>
                </select>
                <select onchange="filterMeals(2)" name="" id="mealRegion">
                    <option selected disabled value= '0'>Region</option>
                    <option value="All regions">All regions</option>
                    <option value="Northern Nigeria">Northern Nigeria</option>
                    <option value="South-East Nigeria">South-East Nigeria</option>
                    <option value="South-South Nigeria">South-South Nigeria</option>
                    <option value="South-West Nigeria">South-West Nigeria</option>
                </select>
                <select onchange="filterMeals(3)" name="" id="mealDifficulty">
                    <option selected disabled value= '0' >Difficulty</option>
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
                <button onclick="clearFilters()" class="btn btn-dark ms-5">Clear Filters</button>
            </div>
        </div>

        <h3 class="mt-5 mb-3">Popular Dishes</h3>

        <div id="displayFoods" class="d-flex flex-wrap align-items-start justify-content-center "></div>
    </section>

</body>
<script src="script.js"></script>

</html>
